<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO - Veterinární Mapa Evropy | ManMat Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Montserrat', sans-serif; }
        body { display: flex; flex-direction: column; }

        .demo-banner {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
            border-bottom: 3px solid #E30A14;
        }
        .demo-badge {
            background: #E30A14;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
        }
        .demo-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .demo-title span { color: #E30A14; }
        .demo-count {
            font-size: 12px;
            color: #aaa;
            font-weight: 400;
        }

        #map { flex: 1; min-height: 0; }

        /* SOS Button */
        .sos-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #E30A14;
            color: #fff;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(227, 10, 20, 0.5), 0 0 0 0 rgba(227, 10, 20, 0.4);
            animation: sosPulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .sos-btn:hover { transform: scale(1.1); }
        @keyframes sosPulse {
            0% { box-shadow: 0 4px 20px rgba(227,10,20,0.5), 0 0 0 0 rgba(227,10,20,0.4); }
            70% { box-shadow: 0 4px 20px rgba(227,10,20,0.5), 0 0 0 16px rgba(227,10,20,0); }
            100% { box-shadow: 0 4px 20px rgba(227,10,20,0.5), 0 0 0 0 rgba(227,10,20,0); }
        }

        /* SOS Panel */
        .sos-panel {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 24px;
            z-index: 1000;
            background: #fff;
            border-radius: 16px;
            padding: 20px 24px;
            width: 280px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            border-top: 4px solid #E30A14;
        }
        .sos-panel.visible { display: block; }
        .sos-panel h3 {
            font-size: 16px;
            font-weight: 800;
            color: #E30A14;
            margin-bottom: 8px;
        }
        .sos-panel p {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .sos-panel .sos-action {
            display: block;
            background: #E30A14;
            color: #fff;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Leaflet popup override */
        .leaflet-popup-content-wrapper {
            border-radius: 12px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
            padding: 0 !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
            min-width: 200px;
        }
        .popup-inner {
            padding: 16px 18px;
        }
        .popup-inner h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #222;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .popup-city {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
        .popup-call {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #E30A14;
            color: #fff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .popup-call:hover { background: #c50812; }
        .popup-call svg {
            width: 14px;
            height: 14px;
            fill: #fff;
        }

        @media (max-width: 600px) {
            .demo-banner { padding: 10px 16px; gap: 8px; }
            .demo-title { font-size: 13px; }
            .demo-count { font-size: 11px; }
            .sos-btn { width: 52px; height: 52px; font-size: 13px; bottom: 16px; right: 16px; }
            .sos-panel { right: 16px; bottom: 80px; width: 260px; }
        }
    </style>
</head>
<body>
    <div class="demo-banner">
        <span class="demo-badge">DEMO</span>
        <span class="demo-title">Veterinární Mapa Evropy | <span>ManMat Club</span></span>
        <span class="demo-count">Zobrazeno 50 z 7 462 klinik v ČR</span>
    </div>

    <div id="map"></div>

    <button class="sos-btn" onclick="toggleSOS()" title="SOS - Nouzové veterinární kontakty">SOS</button>
    <div class="sos-panel" id="sosPanel">

    </div>

    <script>
    const clinics = [

    ];

    // Initialize map
    const map = L.map('map', {
        zoomControl: true
    }).setView([49.8, 15.5], 7);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // Custom red marker icon
    const redIcon = L.divIcon({
        className: 'custom-marker',
        html: `<svg width="28" height="36" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.268 21.732 0 14 0z" fill="#E30A14"/>
            <circle cx="14" cy="13" r="5.5" fill="#fff"/>
            <circle cx="14" cy="13" r="3" fill="#E30A14"/>
        </svg>`,
        iconSize: [28, 36],
        iconAnchor: [14, 36],
        popupAnchor: [0, -36]
    });

    // Add markers
    clinics.forEach(c => {
        const phoneClean = c.p.replace(/\s/g, '');
        const popup = `
            <div class="popup-inner">
                <h3>${c.n}</h3>
                <div class="popup-city">${c.ci}</div>
                <a href="tel:${phoneClean}" class="popup-call">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    VOLAT HNED
                </a>
            </div>
        `;
        L.marker([c.lat, c.lng], { icon: redIcon }).addTo(map).bindPopup(popup);
    });

    // SOS toggle
    function toggleSOS() {
        document.getElementById('sosPanel').classList.toggle('visible');
    }

    // Close SOS panel on map click
    map.on('click', () => {
        document.getElementById('sosPanel').classList.remove('visible');
    });
    </script>
</body>
</html>
